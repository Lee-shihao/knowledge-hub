services:
  knowledge-hub:
    image: knowledge-hub:latest
    ports:
      - "8765:8765"
      - "8766:8766"
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
      - ./models/bge-m3:/models
    environment:
      - KH_SERVER_HOST=0.0.0.0
      - KH_QDRANT_PATH=/app/storage/qdrant
      - KH_DATA_DIR=/app/data
      - KH_SERVER_AUTH_TOKEN=${KH_SERVER_AUTH_TOKEN}
      - HF_HOME=/models
    env_file:
      - .env
    restart: unless-stopped
