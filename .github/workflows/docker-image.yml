name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Build Python wheel
      run: uv build --wheel

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: saxiburry/knowledge-hub
        tags: |
          # Branch push: only sha-<short>
          type=sha,prefix=sha-,event=branch,priority=200
          # Semver tag (v1.2.3): version + latest + minor alias
          type=semver,pattern={{version}},event=tag,priority=300
          type=semver,pattern={{major}}.{{minor}},event=tag,priority=200
          type=raw,value=latest,event=tag,priority=100

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
